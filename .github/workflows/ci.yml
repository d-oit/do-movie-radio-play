name: Quality Gate
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      heavy: ${{ steps.filter.outputs.heavy }}
      agents: ${{ steps.filter.outputs.agents }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'src/**'
              - 'tests/**'
              - 'benchmarks/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            heavy:
              - 'crates/**'
              - 'src/**'
              - 'benchmarks/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            agents:
              - 'AGENTS.md'
              - 'CLAUDE.md'
              - 'GEMINI.md'
              - 'QWEN.md'
              - '.agents/skills/**'
              - 'scripts/validate-agent-entrypoints.sh'
              - 'scripts/generate-skills-md.sh'
            workflows:
              - '.github/workflows/**'

  # ───────────────────────────────────────────────────
  validate-agents:
    name: Validate Agent Entrypoints
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.agents == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run agent validator
        run: ./scripts/validate-agent-entrypoints.sh

  # ───────────────────────────────────────────────────
  lint:
    name: Lint (YAML, Markdown)
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.agents == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install yamllint
        run: pip install yamllint
      - name: YAML Lint
        run: yamllint .
      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: "**/*.md"

  # ───────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning

  gitleaks:
    name: Secret Scan (Gitleaks)
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────────────
  fmt:
    name: Format
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Clippy (all targets, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ───────────────────────────────────────────────────
  test:
    name: Test
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libasound2-dev
      - run: bash scripts/fetch_test_assets.sh
      - run: cargo run --quiet -p movie-radio-timeline -- gen-fixtures --output-dir testdata/generated
      - run: python3 scripts/check_validation_coverage.py --tier A --strict-files
      - run: cargo build --workspace
      - run: cargo test --workspace
      - name: Run doc tests
        run: cargo test --workspace --doc

  # ───────────────────────────────────────────────────
  security:
    name: Security Audit
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit

  # ───────────────────────────────────────────────────
  deny:
    name: Dependency Policy (cargo-deny)
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ───────────────────────────────────────────────────
  benchmark:
    name: Benchmarks
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.heavy == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libasound2-dev
      - run: bash scripts/fetch_test_assets.sh
      - run: bash scripts/benchmark.sh testdata/raw/elephants_dream_2006.mp4 analysis/benchmarks/ci.json
      - run: cargo bench -p benchmarks --bench pipeline_bench -- --noplot
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: analysis/benchmarks/

  # ───────────────────────────────────────────────────
  version-check:
    name: VERSION Consistency
    needs: [changes]
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.code == 'true' ||
      needs.changes.outputs.agents == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check VERSION matches Cargo.toml
        run: |
          VERSION=$(cat VERSION)
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "VERSION file ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "VERSION consistency check passed: $VERSION"

  # ───────────────────────────────────────────────────
  ci-success:
    name: CI Success
    needs: [validate-agents, lint, shellcheck, gitleaks, fmt, clippy, test, security, deny, benchmark, version-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.validate-agents.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.shellcheck.result }}"
            "${{ needs.gitleaks.result }}"
            "${{ needs.fmt.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.test.result }}"
            "${{ needs.security.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.benchmark.result }}"
            "${{ needs.version-check.result }}"
          )
          for res in "${results[@]}"; do
            if [[ "$res" == "failure" || "$res" == "cancelled" ]]; then
              echo "One or more critical CI jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "All CI jobs passed or were correctly skipped!"

# deny.toml - cargo-deny supply chain security (from d-oit/rust-2026-template)
# Run: cargo deny check

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "BSL-1.0",
  "OpenSSL",
  "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

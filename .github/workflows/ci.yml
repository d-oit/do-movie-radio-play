name: Quality Gate
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: cargo build
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: bash scripts/quality_gate.sh

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: bash scripts/benchmark.sh testdata/raw/sintel_trailer_2010.mp4 analysis/benchmarks/ci.json
      - run: python3 scripts/check_benchmark_regression.py --baseline analysis/benchmarks/latest.json --candidate analysis/benchmarks/ci.json
      - run: cargo bench --bench pipeline_bench -- --noplot
      - uses: actions/upload-artifact@v5
        with:
          name: benchmark-artifacts
          path: |
            analysis/benchmarks/ci.json
            analysis/benchmarks/latest.json
            target/criterion

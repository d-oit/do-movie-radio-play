name: Quality Gate
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self_fix_loop_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash -n scripts/self-fix-loop.sh
      - run: bash -n scripts/handoff-to-tasks.sh
      - run: chmod +x scripts/self-fix-loop.sh scripts/handoff-to-tasks.sh
      - run: bash scripts/self-fix-loop.sh --help
      - run: bash scripts/self-fix-loop.sh --dry-run --max-retries 1 --timeout 60 --poll-interval 1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: cargo run --quiet -- gen-fixtures --output-dir testdata/generated
      - run: python3 scripts/check_validation_coverage.py --tier A --strict-files
      - run: cargo build
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: bash scripts/quality_gate.sh

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: bash scripts/benchmark.sh testdata/raw/elephants_dream_2006.mp4 analysis/benchmarks/ci.json
      - run: cargo run --quiet -- bench testdata/raw/elephantsdream_teaser.mp4 --output analysis/benchmarks/ci-elephantsdream-teaser-2006.json
      - run: cargo run --quiet -- bench testdata/raw/caminandes_gran_dillama.mp4 --output analysis/benchmarks/ci-caminandes-gran-dillama-2013.json
      - run: python3 scripts/check_benchmark_regression.py --baseline analysis/benchmarks/latest.json --candidate analysis/benchmarks/ci.json
      - run: python3 scripts/optimize_fp_sweep.py --media testdata/raw/elephantsdream_teaser.mp4 --media testdata/raw/caminandes_gran_dillama.mp4 --output analysis/optimization/fp-sweep-modern-extra-ci.json --work-dir analysis/optimization/fp-sweep-modern-extra-ci-runs
      - run: python3 scripts/build_modern_ci_summary.py --benchmark analysis/benchmarks/ci-elephantsdream-teaser-2006.json --benchmark analysis/benchmarks/ci-caminandes-gran-dillama-2013.json --fp-sweep analysis/optimization/fp-sweep-modern-extra-ci.json --output-md analysis/optimization/modern-extra-ci-summary.md
      - run: cargo bench --bench pipeline_bench -- --noplot
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-modern-movies
          path: |
            analysis/benchmarks/ci.json
            analysis/benchmarks/ci-elephantsdream-teaser-2006.json
            analysis/benchmarks/ci-caminandes-gran-dillama-2013.json
      - uses: actions/upload-artifact@v7
        with:
          name: eval-modern-movies
          path: |
            analysis/optimization/fp-sweep-modern-extra-ci.json
            analysis/optimization/fp-sweep-modern-extra-ci-runs
            analysis/optimization/modern-extra-ci-summary.md

  verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: cargo build --quiet
      - name: Extract timeline for verification
        run: |
          mkdir -p analysis/verification
          cargo run --quiet -- extract testdata/raw/sintel_trailer_2010.mp4 \
            --output analysis/verification/sintel-extracted.json
      - name: Verify timeline
        run: |
          cargo run --quiet -- verify-timeline testdata/raw/sintel_trailer_2010.mp4 \
            --timeline analysis/verification/sintel-extracted.json \
            --output analysis/verification/sintel-verified.json
      - name: Update thresholds from verification
        run: |
          mkdir -p analysis/thresholds
          cargo run --quiet -- update-thresholds \
            --learning-state analysis/thresholds/learning-state.json \
            --output analysis/thresholds/recommendations.json || true

name: Quality Gate
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self_fix_loop_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash -n scripts/self-fix-loop.sh
      - run: bash -n scripts/handoff-to-tasks.sh
      - run: chmod +x scripts/self-fix-loop.sh scripts/handoff-to-tasks.sh
      - run: bash scripts/self-fix-loop.sh --help
      - run: bash scripts/self-fix-loop.sh --dry-run --max-retries 1 --timeout 60 --poll-interval 1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: cargo build
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test
      - run: bash scripts/quality_gate.sh

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: bash scripts/fetch_test_assets.sh
      - run: bash scripts/benchmark.sh testdata/raw/sintel_trailer_2010.mp4 analysis/benchmarks/ci.json
      - run: python3 scripts/check_benchmark_regression.py --baseline analysis/benchmarks/latest.json --candidate analysis/benchmarks/ci.json
      - run: cargo bench --bench pipeline_bench -- --noplot

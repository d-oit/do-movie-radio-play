# .cargo/config.toml
# WSL2/Linux disk space optimization + fast linker config
# See: AGENTS.md - Disk Space Management section

# ─── Dev profile disk space optimization ────────────────────────────────────
# Reduces target/ from ~5GB to ~2GB in large workspaces.
# Maintains fast compilation with essential debug info.
[profile.dev]
debug = "line-tables-only"    # ~60% smaller debug artifacts vs. full debug

[profile.dev.package."*"]
debug = false                  # No debug info for dependencies (huge savings)

[profile.dev.build-override]
opt-level = 3                  # Fast proc-macro execution

# Full debug profile when needed (cargo build --profile debugging)
[profile.debugging]
inherits = "dev"
debug = true

# ─── Cargo alias shortcuts ─────────────────────────────────────────────────
[alias]
# Quick quality check
check-all = "check --workspace --all-features"
# Run all tests
test-all = "test --workspace --all-features"
# Format check (CI-friendly)
fmt-check = "fmt --all -- --check"
# Lint with strict warnings
lint = "clippy --workspace --all-targets --all-features -- -D warnings"
# Dependency audit
audit-check = "deny check"
